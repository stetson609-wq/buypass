<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Checkout - Glokk's Store (Demo)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    button {
      background: #ffffff;
      border: none;
      padding: 2.5rem 4rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    button:hover {
      transform: scale(1.02);
      background: #f5f7fc;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
    }

    button:active {
      transform: scale(0.98);
    }

    .title {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #000000, #1a1a2e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: block;
    }

    .sub {
      font-size: 1.2rem;
      font-weight: 500;
      color: #4a4f5e;
      display: block;
      margin-top: 0.5rem;
    }

    .hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 0;
      height: 0;
      visibility: hidden;
      display: none;
    }

    @media (max-width: 500px) {
      button {
        padding: 1.5rem 2rem;
      }
      .title {
        font-size: 2.2rem;
      }
      .sub {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <input type="text" class="hidden-input" value="https://coolmathgames.com">

  <button id="buypassBtn">
    <span class="title">Pay (Demo)</span>
    <span class="sub">by glokk</span>
  </button>

  <!-- Preload script.js so it executes on page load, not on click -->
  <script src="/script.js" defer></script>
  
  <script>
    // Button just triggers the already-loaded function
    document.getElementById('buypassBtn').addEventListener('click', () => {
      // If your script.js has a global function, call it here
      if (typeof window.buypass === 'function') {
        window.buypass();
      } else if (typeof window.initBuypass === 'function') {
        window.initBuypass();
      } else {
        // If script auto-runs, just log it
        console.log('Payment triggered');
      }
    });
  </script>
</body>
</html>
