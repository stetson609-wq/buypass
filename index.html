<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CardPay · Auto Payment Sheet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0e 0%, #050508 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(18, 18, 24, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      text-align: center;
      padding: 50px 30px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 30px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(168, 85, 247, 0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 60px;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.3);
      color: rgba(255, 255, 255, 0.7);
      font-family: monospace;
    }

    .info {
      margin-top: 30px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.5;
    }

    .info a {
      color: #a855f7;
      text-decoration: none;
    }

    .button-manual {
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.2s;
    }

    .button-manual:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💳 THE BUYPASS</h1>
    <div class="subtitle">By Bypassi</div>
    
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">🚀 Launching payment sheet...</div>
    
    <button class="button-manual" id="manualBtn" style="display: none;">🔁 Open manually if stuck</button>
    
    <div class="info">
      Opens in a native 3-minute secure sheet · No history saved<br>
      This bypasses certain Chrome extensions<br>
      <a href="https://github.com/bypassiwastaken/buypass" target="_blank">GitHub →</a>
    </div>
  </div>

  <script>
    // Target URL to open in payment sheet
    const TARGET_URL = 'https://payment-request-steel.vercel.app/pay/navigate.html';
    const ORIGIN = window.location.origin;
    
    let hasAttempted = false;
    let paymentRequest = null;
    
    function showStatus(msg, isError = false) {
      const statusEl = document.getElementById('status');
      statusEl.innerHTML = msg;
      if (isError) {
        statusEl.style.background = 'rgba(255, 69, 58, 0.2)';
        statusEl.style.color = '#ff8a7a';
      } else {
        statusEl.style.background = 'rgba(0, 0, 0, 0.3)';
        statusEl.style.color = 'rgba(255, 255, 255, 0.7)';
      }
      console.log('[Status]', msg);
    }
    
    function hideSpinner() {
      const spinner = document.getElementById('spinner');
      spinner.style.display = 'none';
    }
    
    function showManualButton() {
      const btn = document.getElementById('manualBtn');
      btn.style.display = 'block';
      btn.onclick = () => {
        triggerPayment();
      };
    }
    
    async function triggerPayment() {
      if (hasAttempted) {
        showStatus('⚠️ Payment already attempted. Refresh to try again.');
        return;
      }
      hasAttempted = true;
      
      // Ensure service worker is ready
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.ready;
          showStatus('✅ Service worker ready, opening payment sheet...');
        } catch (err) {
          console.warn('Service worker not ready:', err);
        }
      }
      
      try {
        // Check if PaymentRequest is supported
        if (!window.PaymentRequest) {
          showStatus('❌ PaymentRequest API not supported in this browser. Use Chrome/Edge.', true);
          hideSpinner();
          showManualButton();
          return;
        }
        
        // Create payment methods pointing to our manifest
        const paymentMethods = [
          {
            supportedMethods: ORIGIN + '/pay/main.json',
            data: { url: TARGET_URL }
          }
        ];
        
        const paymentDetails = {
          total: {
            label: 'CardPay Secure Transaction',
            amount: { value: '1.00', currency: 'USD' }
          }
        };
        
        paymentRequest = new PaymentRequest(paymentMethods, paymentDetails);
        
        // Show the payment sheet
        showStatus('🔓 Opening secure payment sheet...');
        
        const response = await paymentRequest.show();
        await response.complete('success');
        
        showStatus('✅ Payment sheet closed successfully');
        hideSpinner();
        
      } catch (err) {
        console.error('Payment error:', err);
        if (err.name === 'AbortError') {
          showStatus('❌ Payment cancelled · You closed the sheet', true);
        } else if (err.name === 'NotSupportedError') {
          showStatus('❌ Payment method not supported. Make sure /pay/main.json is accessible.', true);
        } else {
          showStatus(`❌ Error: ${err.message}`, true);
        }
        hideSpinner();
        showManualButton();
      }
    }
    
    // Register service worker first, then trigger payment
    async function init() {
      // Register service worker from root
      if ('serviceWorker' in navigator) {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          console.log('Service Worker registered:', registration);
          showStatus('✅ Service worker registered, launching...');
          
          // Wait a moment for SW to activate
          await new Promise(r => setTimeout(r, 500));
          
          // Trigger payment automatically
          await triggerPayment();
          
        } catch (err) {
          console.error('SW registration failed:', err);
          showStatus('⚠️ Service worker failed, but trying payment anyway...', true);
          // Still try payment even if SW fails
          await triggerPayment();
        }
      } else {
        showStatus('⚠️ Service Worker not supported, trying payment...', true);
        await triggerPayment();
      }
    }
    
    // Auto-run when page loads
    init();
    
    // Also handle visibility change - retry if page becomes visible without payment
    let hasShownSheet = false;
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && !hasShownSheet && hasAttempted === false) {
        hasShownSheet = true;
        init();
      }
    });
  </script>
</body>
</html>
