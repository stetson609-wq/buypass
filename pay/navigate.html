// Save as redirect.html - loads target in same tab using history.pushState + fetch + document.write
<script>
// Phase I - preload
let target = 'https://script.google.com/macros/s/AKfycbwz1tvHc7EoSaID2oTdyVQMjqySCYekDE6m9CVkpvVJGA2Z5iY4xDG03LYu-e2uqkw/exec';

// Phase II - history override
history.pushState(null, '', '/');
history.replaceState(null, '', window.location.pathname);

// Phase III - fetch and replace
fetch(target, {mode: 'no-cors', credentials: 'include'})
  .then(() => {
    window.stop();
    document.write('<html><head><meta http-equiv="refresh" content="0;url='+target+'"></head><body></body></html>');
    document.close();
  })
  .catch(() => {
    location.replace(target);
  });

// Phase IV - backup instant redirect
setTimeout(() => { location.href = target; }, 50);
</script>
